<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Pet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-box">
        <div class="logo-area">
            <h2>🐾 Clínica Pet</h2>
        </div>

        <form action="#" method="post">
            <div class="campo">
                <label>E-MAIL</label>
                <input type="email" placeholder="email@exemplo.com" id="email" value="professor@pet.com">
            </div>

            <div class="campo">
                <label>SENHA</label>
                <input type="password" placeholder="••••••••" id="senha" value="123456">
            </div>

            <button type="button" onclick="fazerLogin()">Entrar</button>

        </form>

        <div class="teste-info">
            <p>Teste: professor@pet.com / 123456</p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
